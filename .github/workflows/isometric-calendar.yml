name: Generate 3D Calendar

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨更新
  workflow_dispatch: 

# 赋予 Actions 写入仓库的权限，防止 Commit & Push 时报 Permission denied 错误
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate 3D Contribution Calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # 核心修复：通过环境变量传入 Token 和用户名
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: dayDReam-10

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Update 3D Calendar" || exit 0
          git push
