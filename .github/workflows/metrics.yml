name: Generate Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 每天凌晨自动更新
  workflow_dispatch: # 允许你手动点按钮运行
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dayDReam-10
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # --- 核心风格设定 ---
          config_display: large
          config_padding: 0, 8 + 10%
          
          # --- 语言统计（去色，变黑白灰）---
          plugin_languages: yes
          plugin_languages_colors: "white, lightgray, gray, darkgray, black"
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # 显示半年的活跃度

          # --- 开启十字雷达图 (Activity Overview) ---
          plugin_activity: yes
          plugin_activity_type: summary
          plugin_activity_charts: yes
          
          # --- 如果你还想要奖章模块（那个也很豪华） ---
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

          # --- 优化后的活跃度配置 ---
          plugin_activity: yes
          plugin_activity_type: summary
          plugin_activity_limit: 5
          plugin_activity_days: 14
          
          # --- 优化后的成就配置 ---
          plugin_achievements: yes
          plugin_achievements_threshold: C # 只显示比较高级的奖章，减少计算量
          plugin_achievements_display: compact
