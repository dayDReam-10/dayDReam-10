name: Generate Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dayDReam-10
          template: classic
          base: header, activity, community # 砍掉 metadata
          config_timezone: Asia/Shanghai
          
          # --- 核心风格 ---
          config_display: large
          
          # --- 语言统计 ---
          plugin_languages: yes
          plugin_languages_colors: "white, lightgray, gray, darkgray, black"
          plugin_languages_limit: 8
          
          # --- 3D 活跃度日历 ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # --- 十字雷达图 (这是你最想要的，咱们给它最宽松的限制) ---
          plugin_activity: yes
          plugin_activity_type: summary
          plugin_activity_charts: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14 # 只算最近14天，防止数据量太大报错
          
          # --- 成就奖章 (这是报错高发区，咱们限制只显示 3 个最牛的) ---
          plugin_achievements: yes
          plugin_achievements_limit: 3
          plugin_achievements_threshold: B
          plugin_achievements_display: compact
